<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>WhatsApp Interview Reminder</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Poppins", sans-serif;

        background: linear-gradient(135deg, #075e54, #128c7e, #25d366);

        min-height: 100vh;

        display: flex;
        justify-content: center;
        align-items: center;

        padding: 30px;
      }

      .card {
        width: 100%;
        max-width: 700px;

        background: white;

        border-radius: 25px;

        padding: 40px;

        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);

        animation: fadeIn 0.5s ease;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .header {
        text-align: center;
        margin-bottom: 35px;
      }

      .logo {
        width: 85px;
        height: 85px;

        background: #25d366;

        border-radius: 50%;

        display: flex;
        justify-content: center;
        align-items: center;

        margin: auto;
        margin-bottom: 20px;

        font-size: 38px;

        color: white;

        box-shadow: 0 10px 25px rgba(37, 211, 102, 0.4);
      }

      .title {
        font-size: 30px;
        font-weight: 700;
        color: #1f2937;
      }

      .subtitle {
        margin-top: 10px;

        color: #6b7280;

        font-size: 15px;
      }

      .form-group {
        margin-bottom: 25px;
      }

      label {
        display: block;

        margin-bottom: 10px;

        font-weight: 600;

        color: #374151;
      }

      input,
      textarea {
        width: 100%;

        border: 2px solid #e5e7eb;

        border-radius: 14px;

        padding: 15px;

        font-size: 15px;

        font-family: inherit;

        transition: 0.3s;
      }

      input:focus,
      textarea:focus {
        outline: none;

        border-color: #25d366;

        box-shadow: 0 0 0 4px rgba(37, 211, 102, 0.15);
      }

      textarea {
        min-height: 220px;

        resize: vertical;
      }

      .info-box {
        background: #f0fdf4;

        border: 1px solid #bbf7d0;

        padding: 18px;

        border-radius: 14px;

        margin-bottom: 25px;
      }

      .info-title {
        font-weight: 600;

        margin-bottom: 10px;

        color: #166534;
      }

      .info-box ul {
        padding-left: 20px;

        color: #166534;
      }

      .button {
        width: 100%;

        border: none;

        background: linear-gradient(135deg, #25d366, #128c7e);

        color: white;

        padding: 18px;

        border-radius: 14px;

        font-size: 16px;

        font-weight: 600;

        cursor: pointer;

        transition: 0.3s;

        box-shadow: 0 10px 25px rgba(37, 211, 102, 0.35);
      }

      .button:hover {
        transform: translateY(-2px);

        opacity: 0.95;
      }

      .footer {
        margin-top: 25px;

        text-align: center;

        color: #9ca3af;

        font-size: 13px;
      }

      /* =========================
         POPUP
      ========================= */

      .popup-overlay {
        position: fixed;

        top: 0;
        left: 0;

        width: 100%;
        height: 100%;

        background: rgba(0, 0, 0, 0.5);

        display: flex;
        justify-content: center;
        align-items: center;

        z-index: 9999;

        animation: fadeIn 0.3s ease;
      }

      .popup {
        position: relative;

        width: 420px;

        background: white;

        border-radius: 20px;

        padding: 35px;

        text-align: center;

        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
      }

      .popup-close {
        position: absolute;

        top: 15px;
        right: 15px;

        width: 35px;
        height: 35px;

        border: none;

        border-radius: 50%;

        background: #f3f4f6;

        cursor: pointer;

        font-size: 16px;

        transition: 0.3s;
      }

      .popup-close:hover {
        background: #e5e7eb;
      }

      .popup-icon {
        font-size: 55px;

        margin-bottom: 15px;
      }

      .popup-title {
        font-size: 24px;

        font-weight: 700;

        margin-bottom: 10px;

        color: #111827;
      }

      .popup-message {
        color: #6b7280;

        margin-bottom: 25px;

        font-size: 15px;
      }

      .popup-buttons {
        display: flex;

        gap: 15px;
      }

      .popup-buttons button {
        flex: 1;

        border: none;

        padding: 14px;

        border-radius: 12px;

        font-size: 15px;

        font-weight: 600;

        cursor: pointer;

        transition: 0.3s;
      }

      .btn-restart {
        background: #25d366;

        color: white;
      }

      .btn-restart:hover {
        opacity: 0.9;

        transform: translateY(-2px);
      }
    </style>

    <script>
      function mulaiLagi() {
        closePopup();
      }

      function closePopup() {
        const popup = document.querySelector(".popup-overlay");

        if (popup) {
          popup.style.display = "none";
        }
      }
    </script>
  </head>

  <body>
    <div class="card">
      <div class="header">
        <div class="logo">💬</div>

        <div class="title">WhatsApp Reminder</div>

        <div class="subtitle">Automated Interview Reminder System</div>
      </div>

      <form method="POST" enctype="multipart/form-data">
        <div class="form-group">
          <label> Upload Excel Candidate </label>

          <input type="file" name="excel" required />
        </div>

        <div class="form-group">
          <label> Interview Date </label>

          <input type="date" name="tanggal" required />
        </div>

        <div class="form-group">
          <label> WhatsApp Message Template </label>

          <textarea name="pesan" required>{{ template_pesan }}</textarea>
        </div>

        <div class="info-box">
          <div class="info-title">Excel Required Columns</div>

          <ul>
            <li>Nama</li>
            <li>Nomor</li>
            <li>Posisi</li>
            <li>Tanggal Interview</li>
          </ul>
        </div>

        <button type="submit" class="button">🚀 Send WhatsApp Reminder</button>
      </form>

      <div class="footer">HR Interview Automation System</div>
    </div>

    {% if success_message %}

    <div class="popup-overlay">
      <div class="popup">
        <button class="popup-close" onclick="closePopup()">✕</button>
        <div class="popup-icon">✅</div>

        <div class="popup-title">Pengiriman Berhasil</div>

        <div class="popup-message">{{ success_message }}</div>

        <div class="popup-buttons">
          <button class="btn-restart" onclick="mulaiLagi()">Mulai Lagi</button>
        </div>
      </div>
    </div>

    {% endif %}
  </body>
</html>
